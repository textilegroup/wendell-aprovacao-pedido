<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aprovação de Pedido — Wendell Global Interlining</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap');

        :root {
            --red:     #c41e3a;
            --red-dk:  #a01830;
            --red-lt:  #f9e8eb;
            --green:   #1b7a3e;
            --green-lt:#e8f5ee;
            --gray:    #f4f4f4;
            --border:  #e0e0e0;
            --text:    #1a1a1a;
            --muted:   #6b7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Barlow', sans-serif;
            background: #f0f0f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 12px 40px;
        }

        /* ── CARD PRINCIPAL ── */
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            max-width: 560px;
            width: 100%;
            overflow: hidden;
        }

        /* ── HEADER ── */
        .header {
            background: var(--red);
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .logo {
            width: 56px; height: 56px;
            background: white;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; padding: 4px; flex-shrink: 0;
        }
        .logo img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .header-text h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 20px; font-weight: 700;
            color: white; letter-spacing: 0.5px;
        }
        .header-text p { font-size: 13px; color: rgba(255,255,255,0.85); margin-top: 2px; }

        /* ── BADGE PEDIDO ── */
        .pedido-badge {
            margin: 20px 24px 0;
            background: var(--red-lt);
            border: 1px solid #e8b4be;
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .pedido-badge .num {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 22px; font-weight: 700;
            color: var(--red);
        }
        .pedido-badge .meta { font-size: 12px; color: var(--muted); text-align: right; }

        /* ── SEÇÃO DADOS ── */
        .section {
            margin: 16px 24px 0;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .section-title {
            background: var(--gray);
            padding: 8px 14px;
            font-size: 11px; font-weight: 700;
            color: var(--red);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-bottom: 1px solid var(--border);
        }
        .section-body { padding: 12px 14px; }
        .field-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 5px 0;
            border-bottom: 1px solid #f5f5f5;
            gap: 8px;
        }
        .field-row:last-child { border-bottom: none; }
        .field-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; flex-shrink: 0; }
        .field-value { font-size: 13px; color: var(--text); font-weight: 500; text-align: right; }

        /* ── TABELA ITENS ── */
        .items-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .items-table th {
            background: var(--red); color: white;
            padding: 7px 8px; text-align: left;
            font-size: 10px; font-weight: 700; text-transform: uppercase;
        }
        .items-table td { padding: 7px 8px; border-bottom: 1px solid #f0f0f0; }
        .items-table tr:last-child td { border-bottom: none; }
        .items-table tr:nth-child(even) td { background: #fafafa; }
        .total-row {
            background: var(--red) !important;
            display: flex;
            justify-content: space-between;
            padding: 10px 14px;
            margin: 0 0 0;
        }
        .total-row span { color: white; font-weight: 700; font-size: 14px; }

        /* ── ÁREA DE APROVAÇÃO ── */
        .approval-area {
            margin: 20px 24px;
        }
        .approval-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 16px; font-weight: 700;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--red);
        }

        .btn-group { display: flex; gap: 10px; margin-bottom: 14px; }
        .btn-aprovado, .btn-reprovado {
            flex: 1;
            padding: 14px;
            border: 2px solid;
            border-radius: 8px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 17px; font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.18s;
            background: white;
        }
        .btn-aprovado {
            border-color: var(--green);
            color: var(--green);
        }
        .btn-aprovado:hover, .btn-aprovado.ativo {
            background: var(--green);
            color: white;
        }
        .btn-reprovado {
            border-color: var(--red);
            color: var(--red);
        }
        .btn-reprovado:hover, .btn-reprovado.ativo {
            background: var(--red);
            color: white;
        }

        /* ── MOTIVO REPROVAÇÃO ── */
        .motivo-area {
            display: none;
            animation: slideDown 0.2s ease;
        }
        .motivo-area.visible { display: block; }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .motivo-area label {
            display: block;
            font-size: 12px; font-weight: 700;
            color: var(--red);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .motivo-area textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--red);
            border-radius: 8px;
            font-family: 'Barlow', sans-serif;
            font-size: 14px;
            resize: vertical;
            min-height: 90px;
            outline: none;
            transition: border-color 0.15s;
        }
        .motivo-area textarea:focus { border-color: var(--red-dk); }

        /* ── BOTÃO CONFIRMAR ── */
        .btn-confirmar {
            width: 100%;
            padding: 15px;
            background: var(--red);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 18px; font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 14px;
            transition: background 0.18s, transform 0.12s;
        }
        .btn-confirmar:hover { background: var(--red-dk); }
        .btn-confirmar:active { transform: scale(0.98); }
        .btn-confirmar:disabled { background: #ccc; cursor: not-allowed; }

        /* ── ESTADOS ── */
        .loading-state, .success-state, .error-state, .already-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 24px;
            text-align: center;
            min-height: 300px;
        }
        .loading-state.active, .success-state.active,
        .error-state.active, .already-state.active { display: flex; }

        .spinner {
            width: 48px; height: 48px;
            border: 4px solid #eee;
            border-top: 4px solid var(--red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .state-icon { font-size: 56px; margin-bottom: 16px; }
        .state-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 24px; font-weight: 700;
            margin-bottom: 8px;
        }
        .state-sub { font-size: 14px; color: var(--muted); line-height: 1.5; }
        .success-state .state-title { color: var(--green); }
        .already-state .state-title { color: var(--muted); }
        .error-state .state-title { color: var(--red); }

        /* ── FOOTER ── */
        .footer {
            margin-top: 16px;
            font-size: 11px;
            color: #aaa;
            text-align: center;
        }

        /* ── LOADING INICIAL ── */
        #mainContent { display: none; }
        #initLoader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            padding: 40px;
        }

        @media (max-width: 480px) {
            body { padding: 12px 8px 32px; }
            .header { padding: 14px 16px; }
            .pedido-badge, .section, .approval-area { margin-left: 16px; margin-right: 16px; }
            .btn-aprovado, .btn-reprovado { font-size: 15px; padding: 12px; }
        }
    </style>
</head>
